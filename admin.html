<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0806; color: #f0e8d0;
      font-family: 'Barlow Condensed', sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px),
        #0a0806;
    }
    h1 { font-family: 'Bebas Neue', cursive; font-size: 3rem; margin-bottom: 0.3rem; letter-spacing: 0.05em; }
    .eyebrow {
      font-family: 'Special Elite', cursive; text-transform: uppercase;
      letter-spacing: 0.15em; color: #c9922a; font-size: 0.85rem; margin-bottom: 2rem;
    }
    .card {
      background: #1a1714; border: 1px solid #2a2520;
      padding: 2.5rem; max-width: 500px; width: 100%;
    }
    .card p { font-size: 1.1rem; line-height: 1.7; color: #d4cbb8; margin-bottom: 1.5rem; }
    .card a {
      color: #c9922a; font-weight: 600;
    }
    .card a:hover { color: #f0e8d0; }
    .divider { width: 60px; height: 3px; background: #c9272a; margin: 0 auto 1.5rem; }
  </style>
</head>
<body>
  <h1>The Crown Vics</h1>
  <p class="eyebrow">Admin</p>
  <div class="card">
    <div class="divider"></div>
    <p>To update your website — add shows, change videos, edit text, or enable the livestream — contact your web developer.</p>
    <p>Email: <a href="mailto:430bayside@gmail.com">430bayside@gmail.com</a></p>
  </div>
